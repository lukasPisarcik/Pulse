name: Pulse
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  Pulse:
    type: application
    platform: macOS
    sources:
      - path: Pulse
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Pulse/Resources/Assets.xcassets
    info:
      path: Pulse/Info.plist
      properties:
        CFBundleName: Pulse
        CFBundleDisplayName: Pulse
        CFBundleIdentifier: com.yourname.pulse
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.healthcare-fitness
        NSCalendarsUsageDescription: Pulse reads your calendar to avoid interrupting you during meetings.
        NSCalendarsFullAccessUsageDescription: Pulse reads your calendar to avoid interrupting you during meetings.
        NSHumanReadableCopyright: Copyright © 2026. All rights reserved.
        NSPrincipalClass: NSApplication
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
    entitlements:
      path: Pulse/Pulse.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.automation.apple-events: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.pulse
        PRODUCT_NAME: Pulse
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        COMBINE_HIDPI_IMAGES: YES
